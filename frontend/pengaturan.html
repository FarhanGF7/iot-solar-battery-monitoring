<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ringkasan PLTS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toggle Button -->
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title">FHN Lab - Evaluasi Baterai <span id="device-status" style="font-size: 0.8rem; font-weight: normal; margin-left: 15px; color: #ff5252; background: rgba(255,82,82,0.1); padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(255,82,82,0.2);">Offline 🔴</span></span>
    <div class="topbar-login">
      <img src="assets/user.png" class="login-icon">
      <span id="loginUser">Login</span>
    </div>  
  </div>
  <div class="main-layout">
    <!-- Sidebar -->
    <div class="sidebar hide" id="sidebar">
      <a href="index.html"><img src="assets/web.png" class="icon-menu"> Dashboard Utama</a>
      <a href="analitik.html"><img src="assets/analitics.png" class="icon-menu"> Analitik & Grafik</a>
      <a href="log_data.html"><img src="assets/web.png" class="icon-menu"> Log Data Sensor</a>
      <a href="wiper.html"><img src="assets/solar.png" class="icon-menu"> Wiper Panel</a>
      <a href="pengaturan.html" class="active"><img src="assets/settings.png" class="icon-menu"> Pengaturan</a>
      <a id="logoutLink" href="login.html"><img src="assets/keluar.png" class="icon-menu"> Keluar</a>
    </div>
    
    <!-- Main Content -->
    <div class="content">
        <h2>Manajemen Akun</h2>
  
        <form id="createUserForm" class="form-panel">
          <h4>Buat Akun Baru</h4>
          <input type="text" name="username" placeholder="Username" required>
          <input type="password" name="password" placeholder="Password" required>
          <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
          <button type="submit">Tambah Akun</button>
          <div id="notif"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('hide');
    }
  </script>
  <script src="pengaturan.js"></script>
</body>
</html>
