<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Wiper Panel | PLTS Monitoring</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="wiper.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="topbar">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  <span class="topbar-title">FHN Lab - Evaluasi Baterai <span id="device-status" style="font-size: 0.8rem; font-weight: normal; margin-left: 15px; color: #ff5252; background: rgba(255,82,82,0.1); padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(255,82,82,0.2);">Offline 🔴</span></span>
  <div class="topbar-login">
    <img src="assets/user.png" class="login-icon">
    <span id="loginUser">Login</span>
  </div> 
</div>

<div class="main-layout">

  <!-- SIDEBAR -->
  <div class="sidebar hide" id="sidebar">
    <a href="index.html"><img src="assets/web.png" class="icon-menu"> Dashboard Utama</a>
    <a href="analitik.html"><img src="assets/analitics.png" class="icon-menu"> Analitik & Grafik</a>
    <a href="log_data.html"><img src="assets/web.png" class="icon-menu"> Log Data Sensor</a>
    <a href="wiper.html" class="active"><img src="assets/solar.png" class="icon-menu"> Wiper Panel</a>
    <a href="pengaturan.html"><img src="assets/settings.png" class="icon-menu"> Pengaturan</a>
    <a id="logoutLink" href="login.html"><img src="assets/keluar.png" class="icon-menu"> Keluar</a>
  </div>

  <!-- CONTENT -->
  <div class="main-content">
    <h2>Monitoring Wiper Panel Surya</h2>

    <div class="card-grid">
      <div class="card">
        <h6>Level Debu</h6>
        <h3 id="dustValue">-- mg/m³</h3>
      </div>
    </div>

    <button id="downloadCSV" class="btn-download">
      ⬇ Download Data CSV
    </button>

    <div class="chart-box">
      <h4>Grafik Sensor Debu</h4>
      <canvas id="dustChart"></canvas>
    </div>
  </div>

</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("hide");
  }
  </script>
  
<script src="wiper.js"></script>
<script src="session.js"></script>
</body>
</html>
