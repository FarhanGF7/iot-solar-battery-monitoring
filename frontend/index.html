<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ringkasan PLTS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title">FHN Lab - Evaluasi Baterai <span id="device-status" style="font-size: 0.8rem; font-weight: normal; margin-left: 15px; color: #ff5252; background: rgba(255,82,82,0.1); padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(255,82,82,0.2);">Offline 🔴</span></span>
    <div class="topbar-login">
      <img src="assets/user.png" class="login-icon">
      <span id="loginUser">Login</span>
    </div>    
  </div>

  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar hide" id="sidebar">
      <a href="index.html" class="active"><img src="assets/web.png" class="icon-menu"> Dashboard Utama</a>
      <a href="analitik.html"><img src="assets/analitics.png" class="icon-menu"> Analitik & Grafik</a>
      <a href="log_data.html"><img src="assets/web.png" class="icon-menu"> Log Data Sensor</a>
      <a href="wiper.html"><img src="assets/solar.png" class="icon-menu"> Wiper Panel</a>
      <a href="pengaturan.html"><img src="assets/settings.png" class="icon-menu"> Pengaturan</a>
      <a id="logoutLink" href="login.html"><img src="assets/keluar.png" class="icon-menu"> Keluar</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- METRICS -->
      <div class="analytics-metrics">
        <div class="card">
          <h6>Tegangan Baterai</h6>
          <h4 id="voltage-load">-- V</h4>
        </div>
        <div class="card">
          <h6>Arus Baterai</h6>
          <h4 id="current-load">-- A</h4>
        </div>
        <div class="card">
          <h6>Daya Input Baterai</h6>
          <h4 id="power-load">-- W</h4>
        </div>
        <div class="card" id="card-status">
          <h6>Status Baterai (Fuzzy)</h6>
          <h4 id="battery-status" style="font-weight: bold; margin-bottom: 5px;">--</h4>
          <small id="battery-temp" style="color: #666;">Suhu: -- °C</small><br>
          <small id="battery-score" style="color: #666;">Skor: --</small>
        </div>
      </div>

      <!-- GRAFIK -->
      <div style="margin-top: 20px; width: 100%;">
        <div class="graph-section" style="max-width: 100%; width: 100%; aspect-ratio: 21 / 9; margin: 0; box-sizing: border-box;">
          <div class="graph-header">
            <span>Rata-rata Daya Input: <b id="avg-load">-- W</b></span>
          </div>
          <canvas id="lineChart" height="90"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="chart.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
  <script src="session.js"></script>
</body>
</html>
